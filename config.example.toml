# LLM profile selection
model = "your-model-id"
model_provider = "ark"
profile = "default"

# Agent World LLM agent behavior (async-openai + Responses API)
[llm]
# Optional direct overrides. If omitted, model/base_url/api_key are resolved
# from profile + model_provider.
# model = "your-model-id"
# base_url = "https://api.openai.com/v1"
# api_key = "replace-me"

timeout_ms = 180000
system_prompt = "硅基个体存在的意义是保障硅基文明存续和发展；"
short_term_goal = "保障当前周期生存与执行效率，优先做确定可执行动作。"
long_term_goal = "保障硅基文明存续和发展。"
max_module_calls = 3
max_decision_steps = 4
max_repair_rounds = 1
prompt_max_history_items = 4
prompt_profile = "balanced" # compact / balanced
force_replan_after_same_action = 4 # 0=disable
harvest_max_amount_cap = 100 # harvest_radiation.max_amount 上限
execute_until_auto_reenter_ticks = 4 # 0=disable auto reentry
debug_mode = false

# Optional per-agent goal overrides (agent id normalized to uppercase snake case)
# [llm.agent_overrides.AGENT_0]
# short_term_goal = "优先占领 llm-outpost"
# long_term_goal = "构建持续电力优势"

# Model providers (OpenAI-compatible endpoints)
[model_providers.ark]
base_url = "https://ark.cn-beijing.volces.com/api/v3"
name = "ark"
auth_token = "replace-me"

# Profiles (tuned per model)
[profiles.default]
chat_map_developer_role_to_system = true
model = "your-model-id"
model_context_window = 128000
model_provider = "ark"

[node]
# 节点启动时会读取这两个字段；若 config.toml 缺失或字段为空，会自动生成并写回。
private_key = ""
public_key = ""
