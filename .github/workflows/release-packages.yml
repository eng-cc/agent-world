name: Release Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. v0.1.0"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  RUST_TOOLCHAIN: 1.92.0
  BUILTIN_WASM_TOOLCHAIN: nightly-2025-12-11
  BUILTIN_WASM_TARGET: wasm32-unknown-unknown

jobs:
  release_gate_runtime:
    name: release-gate-runtime
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile default
          rustup target add wasm32-unknown-unknown --toolchain "${RUST_TOOLCHAIN}"
          rustup default "${RUST_TOOLCHAIN}"
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            jq \
            netcat-openbsd \
            pkg-config \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            libx11-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libasound2-dev \
            libudev-dev
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-packages-release-gate-runtime-v1
          cache-on-failure: true
      - name: Install canonical builtin wasm toolchain
        run: |
          rustup toolchain install "${BUILTIN_WASM_TOOLCHAIN}" --profile minimal --component rust-src
          rustup target add "${BUILTIN_WASM_TARGET}" --toolchain "${BUILTIN_WASM_TOOLCHAIN}"
      - name: Run runtime + sync release gate
        run: |
          ./scripts/release-gate.sh \
            --out-dir .tmp/release_gate_runtime \
            --skip-web-strict \
            --skip-s9 \
            --skip-s10
      - name: Upload runtime gate summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-runtime-summary
          path: .tmp/release_gate_runtime
          if-no-files-found: warn

  release_gate_web:
    name: release-gate-web
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile default
          rustup target add wasm32-unknown-unknown --toolchain "${RUST_TOOLCHAIN}"
          rustup default "${RUST_TOOLCHAIN}"
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            netcat-openbsd \
            pkg-config \
            xvfb \
            xauth \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            libx11-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libasound2-dev \
            libudev-dev
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-packages-release-gate-web-v1
          cache-on-failure: true
      - name: Install trunk
        run: env -u RUSTC_WRAPPER cargo install trunk --locked
      - name: Run web strict release gate
        run: |
          xvfb-run -a ./scripts/release-gate.sh \
            --out-dir .tmp/release_gate_web \
            --skip-ci-full \
            --skip-sync \
            --skip-s9 \
            --skip-s10 \
            --web-headed
      - name: Upload web gate summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-web-summary
          path: .tmp/release_gate_web
          if-no-files-found: warn

  release_gate_soak:
    name: release-gate-soak
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile default
          rustup default "${RUST_TOOLCHAIN}"
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            jq \
            pkg-config \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            libx11-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libasound2-dev \
            libudev-dev
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-packages-release-gate-soak-v1
          cache-on-failure: true
      - name: Prewarm soak runtime binary
        run: env -u RUSTC_WRAPPER cargo build -p agent_world --bin world_chain_runtime
      - name: Run soak release gate
        run: |
          ./scripts/release-gate.sh \
            --out-dir .tmp/release_gate_soak \
            --skip-ci-full \
            --skip-sync \
            --skip-web-strict
      - name: Upload soak gate summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-soak-summary
          path: .tmp/release_gate_soak
          if-no-files-found: warn

  release_gate:
    name: release-gate
    if: always()
    needs:
      - release_gate_runtime
      - release_gate_web
      - release_gate_soak
    runs-on: ubuntu-24.04
    steps:
      - name: Assert all release gates passed
        env:
          RUNTIME_RESULT: ${{ needs.release_gate_runtime.result }}
          WEB_RESULT: ${{ needs.release_gate_web.result }}
          SOAK_RESULT: ${{ needs.release_gate_soak.result }}
        run: |
          failed=0
          for gate in runtime web soak; do
            upper_name=$(printf '%s' "$gate" | tr '[:lower:]' '[:upper:]')
            result_var="${upper_name}_RESULT"
            result=${!result_var}
            echo "${gate}: ${result}"
            if [[ "$result" != "success" ]]; then
              failed=1
            fi
          done
          if [[ "$failed" -ne 0 ]]; then
            echo "error: one or more release sub-gates failed" >&2
            exit 1
          fi

  build-web-dist:
    needs: release_gate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile default
          rustup target add wasm32-unknown-unknown --toolchain "${RUST_TOOLCHAIN}"
          rustup default "${RUST_TOOLCHAIN}"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-packages-build-web-dist-v1
          cache-on-failure: true
      - name: Install trunk
        run: env -u RUSTC_WRAPPER cargo install trunk --locked
      - name: Build viewer web dist
        run: |
          mkdir -p output/release
          (
            cd crates/agent_world_viewer
            env -u NO_COLOR trunk build --release --dist ../../output/release/web-dist
          )
      - name: Upload web dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: output/release/web-dist
          if-no-files-found: error

  package-native:
    needs: build-web-dist
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x64
            asset_name: agent-world-linux-x64.tar.gz
            target_triple: native
          - os: macos-14
            platform: macos-x64
            asset_name: agent-world-macos-x64.tar.gz
            target_triple: x86_64-apple-darwin
          - os: windows-2022
            platform: windows-x64
            asset_name: agent-world-windows-x64.zip
            target_triple: native
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned Rust toolchain
        shell: bash
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile default
          rustup default "${RUST_TOOLCHAIN}"
          rustup target add wasm32-unknown-unknown --toolchain "${RUST_TOOLCHAIN}"
          if [[ "${{ matrix.target_triple }}" != "native" ]]; then
            rustup target add "${{ matrix.target_triple }}" --toolchain "${RUST_TOOLCHAIN}"
          fi
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            libx11-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libasound2-dev \
            libudev-dev
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-packages-package-native-${{ runner.os }}-${{ matrix.target_triple }}-v2
          cache-on-failure: true
      - name: Install trunk
        shell: bash
        run: env -u RUSTC_WRAPPER cargo install trunk --locked
      - name: Download web dist artifact
        uses: actions/download-artifact@v5
        with:
          name: web-dist
          path: output/release/web-dist
      - name: Build launcher bundle
        shell: bash
        run: |
          ./scripts/release-prepare-bundle.sh \
            --platform "${{ matrix.platform }}" \
            --target-triple "${{ matrix.target_triple }}" \
            --web-dist output/release/web-dist \
            --out-dir output/release/assets \
            --profile release
      - name: Archive bundle (tar.gz)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          tar -C output/release/assets \
            -czf "output/release/assets/${{ matrix.asset_name }}" \
            "agent-world-${{ matrix.platform }}"
      - name: Archive bundle (zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "output/release/assets/agent-world-${{ matrix.platform }}/*" `
            -DestinationPath "output/release/assets/${{ matrix.asset_name }}" `
            -Force
      - name: Upload platform asset
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-${{ matrix.platform }}
          path: output/release/assets/${{ matrix.asset_name }}
          if-no-files-found: error

  publish-release:
    needs: package-native
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ -z "${tag}" ]]; then
            echo "error: release tag is empty" >&2
            exit 1
          fi
          if [[ "${tag}" != v* ]]; then
            echo "error: release tag must start with 'v': ${tag}" >&2
            exit 1
          fi
          echo "value=${tag}" >> "${GITHUB_OUTPUT}"
      - name: Download packaged assets
        uses: actions/download-artifact@v5
        with:
          pattern: release-asset-*
          path: output/release/assets
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd output/release/assets
          ls -l
          for file in \
            agent-world-linux-x64.tar.gz \
            agent-world-macos-x64.tar.gz \
            agent-world-windows-x64.zip
          do
            [[ -f "${file}" ]] || { echo "error: missing release asset ${file}" >&2; exit 1; }
          done
          sha256sum \
            agent-world-linux-x64.tar.gz \
            agent-world-macos-x64.tar.gz \
            agent-world-windows-x64.zip \
            > agent-world-checksums.txt
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: Agent World ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          files: |
            output/release/assets/agent-world-linux-x64.tar.gz
            output/release/assets/agent-world-macos-x64.tar.gz
            output/release/assets/agent-world-windows-x64.zip
            output/release/assets/agent-world-checksums.txt
