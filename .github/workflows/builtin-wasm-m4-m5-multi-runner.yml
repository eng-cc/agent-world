name: Builtin Wasm m4 m5 Multi Runner

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_TOOLCHAIN: 1.92.0
  AGENT_WORLD_WASM_TOOLCHAIN: nightly-2025-12-11
  AGENT_WORLD_WASM_TARGET: wasm32-unknown-unknown
  AGENT_WORLD_WASM_BUILD_STD: "1"
  AGENT_WORLD_WASM_BUILD_STD_COMPONENTS: std,panic_abort

jobs:
  m4-m5-multi-runner-check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - module_set: m4
            runner_os: ubuntu-24.04
            runner_label: linux-x86_64
          - module_set: m4
            runner_os: macos-14
            runner_label: darwin-arm64
          - module_set: m5
            runner_os: ubuntu-24.04
            runner_label: linux-x86_64
          - module_set: m5
            runner_os: macos-14
            runner_label: darwin-arm64
    runs-on: ${{ matrix.runner_os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned Rust toolchains
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile default
          rustup target add wasm32-unknown-unknown --toolchain "${RUST_TOOLCHAIN}"
          rustup default "${RUST_TOOLCHAIN}"
          rustup toolchain install "${AGENT_WORLD_WASM_TOOLCHAIN}" --profile minimal --component rust-src
          rustup target add "${AGENT_WORLD_WASM_TARGET}" --toolchain "${AGENT_WORLD_WASM_TOOLCHAIN}"
      - name: Run ${{ matrix.module_set }} check and export summary
        run: |
          ./scripts/ci-m1-wasm-summary.sh \
            --module-set "${{ matrix.module_set }}" \
            --runner-label "${{ matrix.runner_label }}" \
            --out "output/ci/${{ matrix.module_set }}-wasm-summary/${{ matrix.runner_label }}.json"
      - name: Upload ${{ matrix.module_set }} summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.module_set }}-wasm-summary-${{ matrix.runner_label }}
          path: output/ci/${{ matrix.module_set }}-wasm-summary/${{ matrix.runner_label }}.json
          if-no-files-found: error

  verify-m4-multi-runner-summary:
    needs: m4-m5-multi-runner-check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Download m4 summary artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: m4-wasm-summary-*
          path: output/ci/m4-wasm-summary
          merge-multiple: true
      - name: Verify m4 multi-runner summaries
        run: |
          ./scripts/wasm-release-evidence-report.sh \
            --module-sets m4 \
            --skip-collect \
            --summary-import-dir output/ci/m4-wasm-summary \
            --out-dir output/ci/m4-wasm-release-evidence \
            --expected-runners linux-x86_64,darwin-arm64
      - name: Upload m4 release evidence report
        uses: actions/upload-artifact@v4
        with:
          name: m4-wasm-release-evidence-report
          path: output/ci/m4-wasm-release-evidence
          if-no-files-found: error

  verify-m5-multi-runner-summary:
    needs: m4-m5-multi-runner-check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Download m5 summary artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: m5-wasm-summary-*
          path: output/ci/m5-wasm-summary
          merge-multiple: true
      - name: Verify m5 multi-runner summaries
        run: |
          ./scripts/wasm-release-evidence-report.sh \
            --module-sets m5 \
            --skip-collect \
            --summary-import-dir output/ci/m5-wasm-summary \
            --out-dir output/ci/m5-wasm-release-evidence \
            --expected-runners linux-x86_64,darwin-arm64
      - name: Upload m5 release evidence report
        uses: actions/upload-artifact@v4
        with:
          name: m5-wasm-release-evidence-report
          path: output/ci/m5-wasm-release-evidence
          if-no-files-found: error
